services:
  activity_db:
    image: postgres:15-alpine
    container_name: activity_tracker_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - activity_tracker_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  activity_api:
    build: ./backend
    container_name: activity_tracker_api
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://${DB_USER}:${DB_PASSWORD}@activity_db:5432/${DB_NAME}?sslmode=disable
    depends_on:
      - activity_db
    restart: always

  activity_ui:
    build: ./frontend
    container_name: activity_tracker_ui
    ports:
      - "3000:80"
    depends_on:
      - activity_api
    restart: always

volumes:
  activity_tracker_data: